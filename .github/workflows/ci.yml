name: CI

on:
  push:
  pull_request:

jobs:
  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Download a pinned Godot binary so local and CI stay deterministic.
      - name: Download Godot 4.2.2 (Ubuntu)
        if: matrix.os == 'ubuntu-latest'
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p .ci/godot
          curl -fsSL "https://github.com/godotengine/godot-builds/releases/download/4.2.2-stable/Godot_v4.2.2-stable_linux.x86_64.zip" -o .ci/godot/godot.zip
          unzip -q .ci/godot/godot.zip -d .ci/godot
          chmod +x .ci/godot/Godot_v4.2.2-stable_linux.x86_64

      # Windows uses the official zipped executable from the same pinned release.
      - name: Download Godot 4.2.2 (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force .ci\godot | Out-Null
          Invoke-WebRequest -Uri "https://github.com/godotengine/godot-builds/releases/download/4.2.2-stable/Godot_v4.2.2-stable_win64.exe.zip" -OutFile ".ci\godot\godot.zip"
          Expand-Archive -Path ".ci\godot\godot.zip" -DestinationPath ".ci\godot" -Force

      - name: Import Godot resources (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          $godotExe = ".\.ci\godot\Godot_v4.2.2-stable_win64.exe"
          & $godotExe --headless --path . --import
          $importExitCode = if ($null -eq $LASTEXITCODE) { 1 } else { $LASTEXITCODE }

          if ($importExitCode -ne 0 -and $importExitCode -ne 1) {
            throw "Godot import failed with exit code $importExitCode."
          }

          $classCache = ".\.godot\global_script_class_cache.cfg"
          if (-not (Test-Path $classCache)) {
            throw "Missing $classCache after import."
          }

          $required = @("GutHookScript","GutInputFactory","GutInputSender","GutMain","GutStringUtils","GutTest","GutUtils")
          $cacheText = Get-Content -Raw $classCache
          $missing = @($required | Where-Object { $cacheText -notmatch $_ })
          if ($missing.Count -gt 0) {
            throw "Missing GUT class_names after import: $($missing -join ', ')"
          }

          if ($importExitCode -eq 1) {
            Write-Warning "Godot import returned exit code 1, but required GUT class_names were found."
          }

      # Reuse the same repo scripts used by developers locally.
      - name: Run tests (Ubuntu)
        if: matrix.os == 'ubuntu-latest'
        shell: bash
        run: |
          chmod +x scripts/run_tests.sh
          ./scripts/run_tests.sh "$(pwd)/.ci/godot/Godot_v4.2.2-stable_linux.x86_64"

      - name: Run tests (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          .\scripts\run_tests.ps1 -GodotExe ".\.ci\godot\Godot_v4.2.2-stable_win64.exe" -SkipImport
